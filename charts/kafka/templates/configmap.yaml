apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kafka.fullname" . }}-config
  namespace: {{ include "cloudpirates.namespace" . }}
  labels:
    {{- include "kafka.labels" . | nindent 4 }}
  {{- with (include "kafka.annotations" .) }}
  annotations:
{{- . | indent 4 }}
  {{- end }}
data:
  server.properties: |
    # --- KRaft (combined broker + controller) ---
    process.roles=broker,controller
    controller.listener.names=CONTROLLER
    inter.broker.listener.name=PLAINTEXT
    listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    listeners=PLAINTEXT://:{{ .Values.service.ports.client }},CONTROLLER://:{{ .Values.service.ports.controller }}
    controller.quorum.voters={{ include "kafka.quorumVoters" . }}

    # --- Storage ---
    log.dirs={{ .Values.persistence.dataDir | default "/var/lib/kafka/data" }}

    # --- Topic defaults ---
    num.partitions={{ .Values.kafkaConfig.numPartitions }}
    default.replication.factor={{ .Values.kafkaConfig.defaultReplicationFactor }}
    offsets.topic.replication.factor={{ .Values.kafkaConfig.offsetsTopicReplicationFactor }}
    transaction.state.log.replication.factor={{ .Values.kafkaConfig.transactionStateLogReplicationFactor }}
    transaction.state.log.min.isr={{ .Values.kafkaConfig.transactionStateLogMinIsr }}
    auto.create.topics.enable={{ .Values.kafkaConfig.autoCreateTopicsEnable }}
    log.retention.hours={{ .Values.kafkaConfig.logRetentionHours }}
    {{- range .Values.kafkaConfig.extraConfig }}
    {{ . }}
    {{- end }}
