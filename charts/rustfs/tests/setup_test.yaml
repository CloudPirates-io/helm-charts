suite: Test setup
templates:
  - setup-job.yaml
  - setup-secret.yaml

tests:
  - it: No setup should be present
    asserts:
      - hasDocuments:
          count: 0

  - it: Secret should be present
    set:
      setup:
        buckets:
          - name: test
    template: setup-secret.yaml
    asserts:
      - documentIndex: 0
        equal:
          path: kind
          value: Secret

      - documentIndex: 0
        equal:
          path: metadata.name
          value: RELEASE-NAME-rustfs-setup

  - it: Secret should not be present if custom defined
    set:
      setup:
        existingSecret: "katze"
    template: setup-secret.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: Setup job should be present
    set:
      setup:
        buckets:
          - name: test
    template: setup-job.yaml
    asserts:
      - documentIndex: 0
        equal:
          path: kind
          value: Job

      - documentIndex: 0
        equal:
          path: metadata.name
          value: RELEASE-NAME-rustfs-setup

  - it: Setup job should be a post-install/post-upgrade hook
    set:
      setup:
        buckets:
          - name: test
    template: setup-job.yaml
    asserts:
      - documentIndex: 0
        equal:
          path: metadata.annotations["helm.sh/hook"]
          value: post-install,post-upgrade

      - documentIndex: 0
        equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: before-hook-creation,hook-succeeded
