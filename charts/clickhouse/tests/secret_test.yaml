suite: test clickhouse secret
templates:
  - secret.yaml
tests:
  - it: should create secret by default
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-clickhouse

  - it: should not create secret when existingSecret is set
    set:
      auth:
        existingSecret: "my-existing-secret"
    asserts:
      - hasDocuments:
          count: 0

  - it: should use provided password when set
    set:
      auth:
        password: "mysecretpassword"
    asserts:
      - equal:
          path: data["clickhouse-password"]
          value: bXlzZWNyZXRwYXNzd29yZA==

  - it: should include host and port keys
    asserts:
      - isNotEmpty:
          path: data.host
      - isNotEmpty:
          path: data["tcp-port"]
      - isNotEmpty:
          path: data["http-port"]
      - isNotEmpty:
          path: data.username
      - isNotEmpty:
          path: data.database
      - isNotEmpty:
          path: data.uri
