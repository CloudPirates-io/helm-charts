{{- if eq .Values.architecture "cluster" }}
{{- include "redis.auth.acl.validate" . -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "redis.fullname" . }}-init-cluster
  namespace: {{ include "cloudpirates.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
  annotations:
{{- include "cloudpirates.tplvalues.render" (dict "value" (include "redis.annotations" .) "context" .) | nindent 4 }}
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "redis.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: cluster-init
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
{{- with (include "redis.imagePullSecrets" .) }}
{{ . | nindent 6 }}
{{- end }}
      securityContext: {{ include "cloudpirates.renderPodSecurityContext" . | nindent 8 }}
      restartPolicy: OnFailure
      containers:
        - name: redis-cluster-init
          image: {{ include "redis.image" . | quote }}
          securityContext: {{ include "cloudpirates.renderContainerSecurityContext" . | nindent 12 }}
          imagePullPolicy: {{ include "cloudpirates.imagePullPolicy" (dict "image" .Values.image) }}
          resources: {{- toYaml .Values.clusterInitJob.resources | nindent 12 }}
          env:
          {{- if and .Values.auth.enabled (not .Values.auth.acl.enabled) }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis.secretName" . }}
                  key: {{ include "redis.secretPasswordKey" . }}
            - name: REDISCLI_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis.secretName" . }}
                  key: {{ include "redis.secretPasswordKey" . }}
            {{- end }}
            {{- with .Values.extraEnvVars }}
{{ toYaml . | indent 12 }}
            {{- end }}
          {{- if or (and .Values.auth.acl.enabled .Values.auth.acl.existingSecret) .Values.tls.enabled }}
          volumeMounts:
            {{- if and .Values.auth.acl.enabled .Values.auth.acl.existingSecret }}
            - name: acl-file
              mountPath: {{ include "redis.auth.acl.path" . }}
              subPath: {{ include "redis.auth.acl.file" . }}
              readOnly: true
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls-certs
              mountPath: /etc/redis/tls
              readOnly: true
            {{- if .Values.tls.client.existingSecret }}
            - name: tls-client-certs
              mountPath: /etc/redis/tls-client
              readOnly: true
            {{- end }}
            {{- end }}
          {{- end }}
          command:
            - /bin/sh
            - -c
            - |
              set -e

              {{- include "redis.auth.acl.setupScript" (dict "type" "job" "context" .) | nindent 14 }}

              PORT={{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }}
              FIRST_NODE="{{ include "redis.fullname" . }}-0.{{ include "redis.fullname" . }}-headless"

              # Wait for every Redis pod to be reachable before deciding what to do
              echo "Waiting for all Redis pods to be reachable..."
              for i in $(seq 0 {{ sub .Values.replicaCount 1 }}); do
                until redis-cli -h {{ include "redis.fullname" . }}-${i}.{{ include "redis.fullname" . }}-headless -p "$PORT"{{- if .Values.tls.enabled }} {{ include "redis.tls.probeArgs" . }}{{- end }} ping 2>/dev/null | grep -q PONG; do
                  echo "Waiting for pod {{ include "redis.fullname" . }}-${i}..."
                  sleep 3
                done
              done

              # If the cluster is already healthy there is nothing to do
              if redis-cli -h "$FIRST_NODE" -p "$PORT"{{- if .Values.tls.enabled }} {{ include "redis.tls.probeArgs" . }}{{- end }} cluster info 2>/dev/null | grep -q "cluster_state:ok"; then
                echo "Redis cluster is already initialized and healthy, skipping creation..."
                exit 0
              fi

              # Detect whether any node already holds cluster state. After all pods are deleted
              # and recreated, nodes reload their persisted nodes.conf and must re-form the cluster
              # via gossip. Running "cluster create" against those non-empty nodes fails with
              # "Node is not empty" and would destroy the existing topology, so we only create a
              # brand new cluster when every node is genuinely empty.
              EXISTING_STATE=false
              for i in $(seq 0 {{ sub .Values.replicaCount 1 }}); do
                INFO=$(redis-cli -h {{ include "redis.fullname" . }}-${i}.{{ include "redis.fullname" . }}-headless -p "$PORT"{{- if .Values.tls.enabled }} {{ include "redis.tls.probeArgs" . }}{{- end }} cluster info 2>/dev/null || echo "")
                KNOWN=$(echo "$INFO" | awk -F: '/cluster_known_nodes:/ {print $2}' | tr -d '\r\n ')
                SLOTS=$(echo "$INFO" | awk -F: '/cluster_slots_assigned:/ {print $2}' | tr -d '\r\n ')
                case "$KNOWN" in ''|*[!0-9]*) KNOWN=0 ;; esac
                case "$SLOTS" in ''|*[!0-9]*) SLOTS=0 ;; esac
                if [ "$KNOWN" -gt 1 ] || [ "$SLOTS" -gt 0 ]; then
                  EXISTING_STATE=true
                  echo "Node {{ include "redis.fullname" . }}-${i} already holds cluster state (known_nodes=$KNOWN, slots_assigned=$SLOTS)"
                  break
                fi
              done

              if [ "$EXISTING_STATE" = "true" ]; then
                # Recovery scenario: let the nodes re-form the cluster via gossip instead of
                # recreating it. This relies on stable peer addressing (cluster.announceHostnames)
                # so nodes.conf entries still resolve after the pods come back with new IPs.
                echo "Existing cluster state detected, waiting up to {{ .Values.clusterInitJob.recoveryTimeout }}s for the cluster to recover..."
                RECOVERY_TIMEOUT={{ .Values.clusterInitJob.recoveryTimeout }}
                elapsed=0
                while [ "$elapsed" -lt "$RECOVERY_TIMEOUT" ]; do
                  if redis-cli -h "$FIRST_NODE" -p "$PORT"{{- if .Values.tls.enabled }} {{ include "redis.tls.probeArgs" . }}{{- end }} cluster info 2>/dev/null | grep -q "cluster_state:ok"; then
                    echo "Redis cluster recovered successfully (cluster_state:ok)."
                    exit 0
                  fi
                  echo "Cluster not healthy yet, retrying in 5s... (${elapsed}s/${RECOVERY_TIMEOUT}s)"
                  sleep 5
                  elapsed=$((elapsed + 5))
                done
                echo "ERROR: Redis cluster did not recover within ${RECOVERY_TIMEOUT}s and nodes still hold stale state." >&2
                echo "Refusing to run 'cluster create' on non-empty nodes to avoid destroying data." >&2
                echo "Ensure cluster.announceHostnames is enabled so nodes can rejoin after IP changes, or, if the" >&2
                echo "data can be discarded, reset the nodes manually (redis-cli -h <node> -p $PORT cluster reset hard)." >&2
                exit 1
              fi

              # All nodes are empty: create a brand new cluster
              echo "All nodes are empty, creating a new Redis cluster..."
              NODES=""
              for i in $(seq 0 {{ sub .Values.replicaCount 1 }}); do
                NODES="$NODES {{ include "redis.fullname" . }}-${i}.{{ include "redis.fullname" . }}-headless:$PORT"
              done

              echo "Creating Redis cluster with nodes: $NODES"
              redis-cli \
                -h "$FIRST_NODE" \
                -p "$PORT" \
                {{- if .Values.tls.enabled }}
                {{ include "redis.tls.probeArgs" . }} \
                {{- end }}
                --cluster create \
                $NODES \
                {{- if ne (int .Values.clusterReplicaCount) 0 }}
                --cluster-replicas {{ .Values.clusterReplicaCount }} \
                {{- end }}
                --cluster-yes
      {{- if or (and .Values.auth.acl.enabled .Values.auth.acl.existingSecret) .Values.tls.enabled }}
      volumes:
        {{- if and .Values.auth.acl.enabled .Values.auth.acl.existingSecret }}
        - name: acl-file
          secret:
            secretName: {{ required "ACL secret name is required when ACL is enabled" .Values.auth.acl.existingSecret }}
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls-certs
          secret:
            secretName: {{ required "TLS secret name is required when TLS is enabled" .Values.tls.existingSecret }}
            items:
              - key: {{ .Values.tls.certFilename }}
                path: {{ .Values.tls.certFilename }}
              - key: {{ .Values.tls.certKeyFilename }}
                path: {{ .Values.tls.certKeyFilename }}
              - key: {{ .Values.tls.certCAFilename }}
                path: {{ .Values.tls.certCAFilename }}
        {{- if .Values.tls.client.existingSecret }}
        - name: tls-client-certs
          secret:
            secretName: {{ .Values.tls.client.existingSecret }}
            items:
              - key: {{ .Values.tls.client.certFilename }}
                path: {{ .Values.tls.client.certFilename }}
              - key: {{ .Values.tls.client.certKeyFilename }}
                path: {{ .Values.tls.client.certKeyFilename }}
        {{- end }}
        {{- end }}
      {{- end }}
      {{- with (.Values.clusterInitJob.nodeSelector | default .Values.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.clusterInitJob.affinity | default .Values.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.clusterInitJob.tolerations | default .Values.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
